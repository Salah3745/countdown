<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>العد التنازلي</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #27475e;
    color: #fff;
    font-family: Arial, sans-serif;
    flex-direction: column;
    text-align: center;
  }

  h1 {
    font-size: 3rem;
    margin-bottom: 20px;
  }

  #countdown {
    font-size: 2.5rem;
    background: #333;
    padding: 20px 40px;
    border-radius: 10px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<h1>مش طاطا اللي يتهلفت في فلوسه</h1>
<div id="countdown">00:00:00</div>

<script>
function updateCountdown() {
    const now = new Date();
    const today10PM = new Date();
    today10PM.setHours(22, 0, 0, 0); // الساعة 10 مساءً

    let diff = today10PM - now;

    if (diff < 0) {
        document.getElementById('countdown').innerHTML = "انتهى الوقت!";
        clearInterval(timer);
        return;
    }

    const hours = Math.floor(diff / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);

    document.getElementById('countdown').innerHTML =
        `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
}

const timer = setInterval(updateCountdown, 1000);
updateCountdown(); // لتحديث العد فورًا عند تحميل الصفحة
</script>
</body>
</html>
